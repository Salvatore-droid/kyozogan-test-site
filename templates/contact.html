{% extends 'base.html' %}
{% block title %}Contact Us — Northbridge{% endblock %}
{% block content %}
<div class="breadcrumb"><a href="/">Home</a> / Contact</div>
<h1 class="section-title" style="margin-top:0;">Contact Us</h1>

{% if sent %}<div class="alert alert-success">Thanks — your message has been received. We'll respond within one business day.</div>{% endif %}

<div class="panel" style="max-width:520px;">
  <form method="POST" action="/contact">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name">
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email">
    </div>
    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message"></textarea>
    </div>
    <button type="submit" class="btn-primary">Send Message</button>
  </form>
</div>
{% endblock %}
