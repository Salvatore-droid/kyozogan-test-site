{% extends 'base.html' %}
{% block title %}Forgot Password — Northbridge{% endblock %}
{% block content %}
<div class="breadcrumb"><a href="/">Home</a> / Forgot Password</div>
<div class="panel" style="max-width:420px; margin:0 auto;">
  <h1 style="margin-top:0; font-size:20px;">Reset Your Password</h1>
  {% if sent %}
    <div class="alert alert-info">If an account exists with that email, a reset link has been sent.</div>
  {% endif %}
  <form method="POST" action="/forgot-password">
    <div class="form-group">
      <label for="email">Account Email</label>
      <input type="email" id="email" name="email">
    </div>
    <button type="submit" class="btn-primary" style="width:100%;">Send Reset Link</button>
  </form>
</div>
{% endblock %}
